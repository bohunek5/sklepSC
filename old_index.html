<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prescot LED - Nowoczesne systemy oświetlenia liniowego i zasilania</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Theme CSS -->
<link href="/assets/xo-webcomponents.min.css" rel="stylesheet"/>
<link href="/assets/main.min.css" rel="stylesheet"/>
<style>
    :root {
      --primary-color: #0b1a30;
      --accent-color: #ff5a00;
      --text-color: #333333;
      --light-bg: #f4f6f9;
      --white: #ffffff;
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-color);
      background-color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      color: var(--primary-color);
    }

    /* Common Header with Glassmorphism */
    .mockup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: transparent;
      border-bottom: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      transition: background 0.3s ease;
    }

    .mockup-header.scrolled {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 15px 8%;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .mockup-header.scrolled .mockup-nav a {
      color: var(--primary-color);
    }

    .mockup-header.scrolled .mockup-action-icon {
      color: var(--primary-color);
    }

    .mockup-header-logo img {
      height: 28px;
      display: block;
    }

    .mockup-nav ul {
      display: flex;
      list-style: none;
      gap: 12px;
      align-items: center;
    }

    .mockup-nav a {
      text-decoration: none;
      color: var(--white);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 20px;
      border-radius: 99px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: block;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .mockup-nav a:hover {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      color: #fff !important;
    }

    .mockup-nav a.active {
      background: #ffffff !important;
      border: 1px solid rgba(0, 0, 0, 0.08) !important;
      color: var(--primary-color) !important;
      font-weight: 700 !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08) !important;
    }

    /* Scrolled states */
    .mockup-header.scrolled .mockup-nav a {
      color: var(--primary-color) !important;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: none;
    }

    .mockup-header.scrolled .mockup-nav a:hover {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.12);
      color: #000 !important;
      transform: translateY(-1px);
    }

    .mockup-header.scrolled .mockup-nav a.active {
      background: #ffffff !important;
      border: 1px solid rgba(0, 0, 0, 0.08) !important;
      color: var(--primary-color) !important;
      font-weight: 700 !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08) !important;
    }

    .mockup-header.scrolled {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 15px 8%;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    
    /* Magic Dropdown Universal Fix */
    body .magic-dropdown {
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
      background: var(--white);
    }
    body .has-mega-menu:hover .magic-dropdown {
      opacity: 1;
      visibility: visible;
    }
    .magic-dropdown ul li a {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: var(--primary-color) !important;
      padding: 12px 15px !important;
      border-radius: 8px !important;
    }
    .magic-dropdown ul li a:hover {
      background: rgba(0, 0, 0, 0.05) !important;
      color: var(--primary-color) !important;
      transform: translateX(5px) !important;
    }
    
    .mockup-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mockup-action-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--primary-color);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }

    .mockup-action-icon svg {
      width: 22px;
      height: 22px;
      transition: transform 0.3s;
    }

    .mockup-action-icon:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      color: #fff !important;
    }
    
    .mockup-action-icon:hover svg {
      transform: scale(1.1);
    }

    .mockup-header.scrolled .mockup-action-icon {
      background: rgba(10, 25, 47, 0.06);
      border-color: rgba(10, 25, 47, 0.12);
      color: var(--primary-color) !important;
    }

    .mockup-header.scrolled .mockup-action-icon:hover {
      background: rgba(10, 25, 47, 0.12);
      border-color: rgba(10, 25, 47, 0.22);
      color: var(--primary-color) !important;
      transform: translateY(-2px);
    }

    /* Mobile Hamburger Menu */
    .menu-toggle {
      display: none;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--primary-color);
    }

    .mobile-menu {
      position: fixed;
      top: 75px;
      left: 0;
      width: 100%;
      height: calc(100vh - 75px);
      background: var(--white);
      z-index: 999;
      padding: 40px 8%;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
      transform: translateY(-20px);
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .mobile-menu.active {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .mobile-menu a {
      text-decoration: none;
      color: var(--primary-color);
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Hero Slideshow Styling */
    .mockup-hero-slider {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background-color: #000;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10%;
      transition: clip-path 1.4s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .slide:nth-child(even) {
      clip-path: inset(0 0 0 100%);
    }
    
    .slide:nth-child(odd) {
      clip-path: inset(0 100% 0 0);
    }

    .slide.active {
      z-index: 10;
      clip-path: inset(0 0 0 0) !important;
    }

    .slide.leaving {
      z-index: 5;
      clip-path: inset(0 0 0 0) !important;
      transition: none;
    }

    .slide-bg, .slide-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      object-fit: cover;
      transform: scale(1.12);
      transition: transform 1.4s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .desktop-bg {
      display: block;
    }
    
    .mobile-bg {
      display: none;
    }
    
    @media (max-width: 768px) {
      .desktop-bg {
        display: none !important;
      }
      .mobile-bg {
        display: block !important;
        background-position: center center;
      }
    }

    .slide.active .slide-bg, .slide.active .slide-video {
      transform: scale(1);
    }

    .slide::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 1;
    }

    /* Centered Banner Box with Glassmorphism */
    .slide-banner-box {
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 40px;
      padding: 60px 80px;
      text-align: center;
      z-index: 10;
      width: 540px;
      max-width: 90%;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: scale(0.92);
      opacity: 0;
      transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0s, opacity 1s ease 0s;
      border: 1px solid rgba(255, 255, 255, 0.12); /* base border */
    }

    /* SVG Glowing track styling */
    .glass-border-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 40px;
    }

    .glass-border-svg rect {
      x: 0.5px;
      y: 0.5px;
      width: calc(100% - 1px);
      height: calc(100% - 1px);
      rx: 40px;
      ry: 40px;
    }

    .glass-border-svg .track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 1.5px;
    }

    .glass-border-svg .car {
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.5px;
      stroke-linecap: round;
      stroke-dasharray: 12 88;
      stroke-dashoffset: 100;
      filter: url(#glowBlur);
      animation: runTrack 4s linear infinite;
    }

    @keyframes runTrack {
      from {
        stroke-dashoffset: 100;
      }
      to {
        stroke-dashoffset: 0;
      }
    }

    /* 1. Mono (Cool White Pulse - Brighten/Dim) */
    .slide[data-tech="mono"] .glass-border-svg .car {
      stroke: #ffffff;
      stroke-dasharray: none;
      stroke-dashoffset: 0;
      animation: monoPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes monoPulse {
      0% {
        opacity: 0.25;
        stroke-width: 1.5px;
        filter: drop-shadow(0 0 1px #e0f0ff);
      }
      100% {
        opacity: 1;
        stroke-width: 4px;
        filter: drop-shadow(0 0 8px #e0f0ff);
      }
    }

    /* 2. CCT (Tunable White: Warm -> Cool) */
    .slide[data-tech="cct"] .glass-border-svg .car {
      animation: runTrack 4s linear infinite, cctColor 8s ease-in-out infinite alternate;
    }
    @keyframes cctColor {
      0% { stroke: #ffea9f; }
      50% { stroke: #ffffff; }
      100% { stroke: #d0e7ff; }
    }

    /* 3. RGB (Vibrant Color Swaps) */
    .slide[data-tech="rgb"] .glass-border-svg .car {
      animation: runTrack 4s linear infinite, rgbColor 6s linear infinite;
    }
    @keyframes rgbColor {
      0% { stroke: #ff007f; }
      33% { stroke: #00ff7f; }
      66% { stroke: #007fff; }
      100% { stroke: #ff007f; }
    }

    /* 4. RGB+CCT (Rainbow + Tunable White) */
    .slide[data-tech="rgbcct"] .glass-border-svg .car {
      animation: runTrack 4s linear infinite, rgbCctColor 10s linear infinite;
    }
    @keyframes rgbCctColor {
      0% { stroke: #ff3366; }
      20% { stroke: #33ff66; }
      40% { stroke: #3366ff; }
      60% { stroke: #ffea9f; }
      80% { stroke: #d0e7ff; }
      100% { stroke: #ff3366; }
    }

    /* 5. COB (Continuous Pulsing Frame) */
    .slide[data-tech="cob"] .glass-border-svg .car {
      stroke: #ffea9f;
      stroke-dasharray: none;
      stroke-dashoffset: 0;
      animation: cobPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes cobPulse {
      0% {
        opacity: 0.35;
        stroke-width: 1.5px;
      }
      100% {
        opacity: 1;
        stroke-width: 3.5px;
      }
    }

    /* 6. Digital (Addressable Chasing Modules) - Cool White blocks drawing slowly and staying */
    .slide[data-tech="digital"] .glass-border-svg .car {
      stroke: #ffffff !important;
      filter: drop-shadow(0 0 6px #e0f0ff) !important;
      stroke-dasharray: 4 6 !important;
      stroke-dashoffset: 100 !important;
    }
    .slide.active[data-tech="digital"] .glass-border-svg .car {
      animation: digitalBuild 12s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
    }
    @keyframes digitalBuild {
      0% {
        stroke-dashoffset: 100;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    /* 7. Bread (Warm Yellow Cozy Frame) */
    .slide[data-tech="bread"] .glass-border-svg .car {
      stroke: #ffaa00;
      stroke-dasharray: none;
      stroke-dashoffset: 0;
      animation: breadPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes breadPulse {
      0% {
        opacity: 0.3;
        stroke-width: 1.5px;
      }
      100% {
        opacity: 1;
        stroke-width: 3.5px;
        filter: drop-shadow(0 0 6px #ffaa00);
      }
    }

    /* 8. Digital CCT (Addressable Chasing CCT Colors) - Cool White blocks accumulating and staying */
    .slide[data-tech="digital_cct"] .glass-border-svg .car {
      stroke: #ffffff !important;
      filter: drop-shadow(0 0 6px #e0f0ff) !important;
      stroke-dasharray: 0 100 !important;
      stroke-dashoffset: 100 !important;
    }
    .slide.active[data-tech="digital_cct"] .glass-border-svg .car {
      animation: digitalCctAccumulate 12s cubic-bezier(0.2, 0.8, 0.2, 1) forwards !important;
    }
    @keyframes digitalCctAccumulate {
      0% {
        stroke-dasharray: 0 100;
        stroke-dashoffset: 100;
      }
      10% {
        stroke-dasharray: 4 96;
        stroke-dashoffset: 90;
      }
      20% {
        stroke-dasharray: 4 6 4 86;
        stroke-dashoffset: 80;
      }
      35% {
        stroke-dasharray: 4 6 4 6 4 76;
        stroke-dashoffset: 70;
      }
      50% {
        stroke-dasharray: 4 6 4 6 4 6 4 66;
        stroke-dashoffset: 55;
      }
      65% {
        stroke-dasharray: 4 6 4 6 4 6 4 6 4 56;
        stroke-dashoffset: 40;
      }
      80% {
        stroke-dasharray: 4 6 4 6 4 6 4 6 4 6 4 46;
        stroke-dashoffset: 25;
      }
      95% {
        stroke-dasharray: 4 6 4 6 4 6 4 6 4 6 4 6 4 6 36;
        stroke-dashoffset: 10;
      }
      100% {
        stroke-dasharray: 100 0;
        stroke-dashoffset: 0;
      }
    }

    .slide.active .slide-banner-box {
      transform: scale(1);
      opacity: 1;
    }

    /* Slide content elements delayed fade-in */
    .slide-banner-box h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 46px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--white);
      letter-spacing: -0.5px;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.4s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
    }

    .slide-banner-box p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 35px;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 0.7s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

    .slide-banner-box .mockup-btn {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.8s ease 1s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s, background 0.3s, border-color 0.3s, color 0.3s;
      background: var(--white);
      color: var(--primary-color);
      border: 2px solid var(--white);
      padding: 15px 38px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      display: block;
    }

    .slide-banner-box .mockup-btn:hover {
      background: #ffffff !important;
      border-color: var(--primary-color) !important;
      color: var(--primary-color) !important;
    }

    .slide.active .slide-banner-box h1,
    .slide.active .slide-banner-box p,
    .slide.active .slide-banner-box .mockup-btn {
      opacity: 1;
      transform: translateY(0);
    }

    /* Slider Controls */
    .slider-arrows {
      position: absolute;
      bottom: 50px;
      right: 10%;
      z-index: 20;
      display: flex;
      gap: 15px;
    }

    .slider-arrow {
      width: 50px;
      height: 50px;
      
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: transparent;
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .slider-arrow:hover {
      background: var(--white);
      color: var(--primary-color);
      border-color: var(--white);
    }

    /* Categories section */
    .mockup-categories {
      padding: 100px 8% 50px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .category-card {
      position: relative;
      height: 300px;
      overflow: hidden;
      cursor: pointer;
    }

    .category-bg {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: var(--transition);
    }

    .category-card:hover .category-bg {
      transform: scale(1.08);
    }

    .category-content {
      position: absolute;
      bottom: 30px;
      left: 30px;
      color: var(--white);
      z-index: 2;
    }

    .category-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    .category-content h3 {
      color: var(--white);
      font-size: 24px;
      margin-bottom: 5px;
    }

    .category-content span {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--white);
      padding-bottom: 2px;
    }

    /* Products Section */
    .mockup-products {
      padding: 80px 8%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .mockup-section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .mockup-section-header span {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent-color);
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }

    .mockup-section-title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .mockup-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .mockup-product-card {
      background: var(--white);
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      transition: var(--transition);
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    .mockup-product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.09);
    }

    .mockup-product-media {
      position: relative;
      width: 100%;
      height: 400px;
      overflow: hidden;
      background-color: var(--light-bg);
    }

    .mockup-product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .mockup-product-card:hover .mockup-product-img {
      transform: scale(1.05);
    }

    .mockup-product-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      background: var(--primary-color);
      color: var(--white);
      padding: 5px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .product-actions-hover {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      transform: translateY(20px);
      opacity: 0;
      transition: var(--transition);
      z-index: 10;
    }

    .mockup-product-card:hover .product-actions-hover {
      transform: translateY(0);
      opacity: 1;
    }

    .action-btn-circle {
      width: 45px;
      height: 45px;
      background: var(--white);
      color: var(--primary-color);
      
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .action-btn-circle:hover {
      background: var(--primary-color);
      color: var(--white);
    }

    .mockup-product-info {
      padding: 20px 0 0;
      text-align: left;

    .mockup-product-category {

    /* MAGIC DROPDOWN - DESKTOP */
    .has-mega-menu {
      position: relative;
    }
    .has-mega-menu > a {
      display: flex;
      align-items: center;
      transition: all 0.3s ease;
    }
    .has-mega-menu:hover > a {
      color: var(--accent-color);
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
    }
    
    .magic-dropdown {
      position: absolute;
      top: calc(100% + 20px);
      left: 50%;
      transform: translateX(-50%) perspective(1000px) rotateX(-15deg) scale(0.9);
      background: rgba(11, 26, 48, 0.85); /* Dark blue glass */
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset, 0 0 20px rgba(255, 170, 0, 0.15);
      border-radius: 20px;
      width: 600px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
      padding: 25px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      pointer-events: none;
    }
    
    /* Magical animated glowing border inside */
    .magic-dropdown::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 100%;
      background: radial-gradient(circle 800px at var(--mouse-x, 50%) var(--mouse-y, 0%), rgba(255, 170, 0, 0.15), transparent 40%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .has-mega-menu:hover .magic-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) perspective(1000px) rotateX(0deg) scale(1);
      pointer-events: auto;
    }
    .has-mega-menu:hover .magic-dropdown::before {
      opacity: 1;
    }

    .magic-dropdown-section {
      position: relative;
    }
    .magic-dropdown-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      font-weight: 700;
      padding-bottom: 15px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transform: translateY(10px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
    }
    .has-mega-menu:hover .magic-dropdown-title {
      transform: translateY(0);
      opacity: 1;
    }

    .magic-dropdown ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .magic-dropdown ul li {
      transform: translateY(15px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    /* Staggered animation */
    .has-mega-menu:hover .magic-dropdown ul li:nth-child(1) { transition-delay: 0.15s; transform: translateY(0); opacity: 1; }
    .has-mega-menu:hover .magic-dropdown ul li:nth-child(2) { transition-delay: 0.2s; transform: translateY(0); opacity: 1; }
    .has-mega-menu:hover .magic-dropdown ul li:nth-child(3) { transition-delay: 0.25s; transform: translateY(0); opacity: 1; }
    .has-mega-menu:hover .magic-dropdown ul li:nth-child(4) { transition-delay: 0.3s; transform: translateY(0); opacity: 1; }

    .magic-dropdown ul li a {
      color: #fff !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      text-decoration: none !important;
      transition: all 0.3s ease !important;
      display: flex !important;

    .magic-dropdown ul li a::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;

    .magic-dropdown ul li a:hover {
